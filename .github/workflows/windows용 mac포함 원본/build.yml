name: Build & Release

on:
  push:
    tags:
      - 'v*'          # v1.0.0 처럼 태그 push 시 자동 빌드 (Mac/Windows 항상 함께)
  workflow_dispatch:  # GitHub Actions 탭에서 수동 실행 — 플랫폼 선택 가능
    inputs:
      platform:
        description: '빌드할 플랫폼 선택 (태그 push로 실행할 땐 이 값과 무관하게 항상 all으로 동작합니다)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - win

permissions:
  contents: write   # release 잡이 GitHub Release를 생성/첨부하려면 필요

jobs:
  # ── macOS 빌드 (.dmg) ──────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    # 태그 push(github.event_name == 'push')일 땐 항상 실행(기존 동작 유지).
    # workflow_dispatch로 수동 실행할 때만 platform 선택값을 확인한다.
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'mac'
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: React 빌드 + Electron 패키징
        run: npm run build:mac
        env:
          CI: false   # react-scripts 경고를 에러로 처리하지 않음
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          # latest-mac.yml + *.blockmap: electron-updater가 새 버전 여부를
          # 판별하는 데 필요한 메타데이터 (2026-07-08 추가, 이게 없으면
          # 자동 업데이트 확인이 항상 조용히 실패함)
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest-mac.yml
            dist/*.blockmap

  # ── Windows 빌드 (.exe) ────────────────────────────────────────
  build-win:
    runs-on: windows-2022   # VS 2022 (v17) 고정 — windows-latest는 VS 2025(v18)로 node-gyp 미지원
    # 태그 push일 땐 항상 실행(기존 동작 유지).
    # workflow_dispatch로 수동 실행할 때만 platform 선택값을 확인한다.
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'win'
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: React 빌드 + Electron 패키징
        run: npm run build:win
        env:
          CI: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 빌드 결과물 업로드
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          # latest.yml + *.blockmap: electron-updater 새 버전 판별용 메타데이터
          # (2026-07-08 추가)
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap

  # ── Release 생성 (태그 push 시만) ────────────────────────────────
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    # needs로 지정한 잡 중 하나가 platform 선택으로 건너뛰어진(skipped) 경우에도
    # 이 잡 자체는 계속 진행되도록 always()를 추가 (2026-07-16 Windows 포팅 시 추가).
    # 원래는 build-mac/build-win이 항상 둘 다 성공(success)해야만 다음으로
    # 넘어갔지만, 플랫폼을 선택해 한쪽이 skipped되면 그 상태로도 릴리즈는
    # 계속 진행되어야 하므로 always()로 바꾸고, 태그 push 여부만 별도로 검사한다.
    if: always() && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: mac 빌드 다운로드
        # build-mac이 platform 선택으로 건너뛰어졌다면 이 스텝은 건너뛴다
        # (아티팩트 자체가 없어 다운로드 시도 시 실패하므로).
        if: needs.build-mac.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: win 빌드 다운로드
        if: needs.build-win.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts/win

      - name: GitHub Release 생성 및 파일 첨부
        uses: softprops/action-gh-release@v2
        with:
          # 존재하지 않는 플랫폼 폴더의 glob은 자동으로 무시됨(매칭되는
          # 파일이 없으면 그냥 건너뜀) — mac/win 중 하나만 빌드된 경우에도
          # 문제없이 있는 파일만 첨부된다.
          files: |
            artifacts/mac/*.dmg
            artifacts/mac/*.zip
            artifacts/mac/latest-mac.yml
            artifacts/mac/*.blockmap
            artifacts/win/*.exe
            artifacts/win/latest.yml
            artifacts/win/*.blockmap
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
